name: release

# Build the single-file executables for Windows, macOS (Intel + Apple Silicon),
# and Linux whenever a version tag like v1.5.1 is pushed, and attach them to a
# GitHub Release.
#
# Each OS is built on its OWN native runner (not cross-compiled on Linux). This
# avoids the "base binary not in remote cache -> can't cross-build" failure, and
# lets macOS ad-hoc code-signing happen on a real macOS machine.
#
#   git tag v1.5.1
#   git push origin v1.5.1

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.out }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false      # one platform failing must not cancel the others
      matrix:
        include:
          - { runner: ubuntu-latest,  target: node22-linux-x64,    out: U1-Print-Hub-Linux-x64 }
          - { runner: windows-latest, target: node22-win-x64,      out: U1-Print-Hub-Windows-x64.exe }
          - { runner: macos-13,       target: node22-macos-x64,    out: U1-Print-Hub-macOS-Intel }
          - { runner: macos-14,       target: node22-macos-arm64,  out: U1-Print-Hub-macOS-AppleSilicon }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Safety net: if a prebuilt Node base is ever missing and pkg has to build
      # from source, Windows needs NASM. Linux/macOS runners already have toolchains.
      - name: Install NASM (Windows source-build fallback)
        if: runner.os == 'Windows'
        run: choco install nasm -y

      - name: Install dependencies
        run: npm install

      - name: Build executable
        run: npx @yao-pkg/pkg . --targets ${{ matrix.target }} --output dist/${{ matrix.out }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: dist/${{ matrix.out }}
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show what will be published
        run: ls -la dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## U1 Print Hub

            Download the build for your OS, put it in its own folder, and run it —
            no Node.js needed. A browser opens to the dashboard; use **Settings**
            to add your printers.

            **First-launch security warning (the apps are unsigned):**
            - **Windows:** SmartScreen may say "Windows protected your PC" → click **More info → Run anyway**.
            - **macOS:** right-click the file → **Open** (or run `xattr -dr com.apple.quarantine <file>` once).

            If something on the default port 4545 is already running, close it first — two copies can't share the port.
